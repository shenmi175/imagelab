services:
  postgres:
    image: postgres:16-alpine
    container_name: image-site-postgres
    environment:
      POSTGRES_USER: image_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-image_app_password}
      POSTGRES_DB: image_app
    volumes:
      - image_site_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U image_app -d image_app"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - image-site

  redis:
    image: redis:7-alpine
    container_name: image-site-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - image_site_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - image-site

  migrate:
    build: .
    container_name: image-site-migrate
    command: sh -c "npx prisma migrate deploy && npm run seed"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - image-site

  app:
    build: .
    container_name: image-site-app
    command: npm run start
    env_file:
      - .env
    ports:
      - "3005:3000"
    volumes:
      - ./storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - image-site

  worker:
    build: .
    container_name: image-site-worker
    command: npm run worker
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - image-site

volumes:
  image_site_postgres:
  image_site_redis:

networks:
  image-site:
